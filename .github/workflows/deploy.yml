name: Build and Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - demo
  pull_request:
    branches:
      - main
      - demo

jobs:
  lint-and-ty  sync-demo:
    name: Sync main to demo
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync demo branch with main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查远程 demo 分支是否存在
          if git ls-remote --heads origin demo | grep -q demo; then
            # demo 分支存在，执行同步
            git checkout demo
            git merge main --no-edit -X theirs
            git push origin demo
            echo "✅ demo branch synced with main"
          else
            # demo 分支不存在，创建它
            git checkout -b demo
            git push origin demo
            echo "✅ demo branch created from main"
          fi

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: sync-demo
    if: always() && !cancelled()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true

  deploy-main:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [sync-demo, lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to drive.iodevo.com
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deployment Success
        run: |
          echo "✅ Production deployment successful!"
          echo "🌐 https://drive.iodevo.com"

  deploy-demo:
    name: Deploy to Demo
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/demo' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to demo.iodevo.com
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.demo.toml

      - name: Deployment Success
        run: |
          echo "✅ Demo deployment successful!"
          echo "🌐 https://demo.iodevo.com"
