name: Build and Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - demo
  pull_request:
    branches:
      - main
      - demo

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npx wrangler deploy src/index.ts --name iodrive --compatibility-date 2024-12-01 --dry-run --outdir=dist 2>&1 || true

      - name: Run tests
        run: npm test
        continue-on-error: true

  deploy-main:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create production config
        run: |
          cat > wrangler.toml <<'EOF'
          name = "iodrive"
          main = "src/index.ts"
          compatibility_date = "2024-12-01"
          account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          routes = [{ pattern = "drive.iodevo.com/*", zone_name = "iodevo.com" }]
          [vars]
          ADMIN_USER = "admin"
          R2_PUBLIC_DOMAIN = "r2.iodevo.com"
          R2_BUCKET = "iodrive-apac"
          R2_ACCOUNT_ID = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          TURNSTILE_SITE_KEY = "${{ secrets.TURNSTILE_SITE_KEY }}"
          S3_ENDPOINT = "${{ secrets.S3_ENDPOINT }}"
          S3_BUCKET = "${{ secrets.S3_BUCKET }}"
          S3_REGION = "${{ secrets.S3_REGION }}"
          PUBLIC_UPLOAD_PATH = "uploads/public/"
          [[r2_buckets]]
          binding = "DRIVE"
          bucket_name = "iodrive-apac"
          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF

      - name: Create secrets file
        run: |
          cat > .dev.vars <<'EOF'
          ADMIN_PASS=${{ secrets.ADMIN_PASS }}
          TURNSTILE_SECRET=${{ secrets.TURNSTILE_SECRET }}
          TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          EOF

      - name: Deploy to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Success
        run: echo "✅ https://drive.iodevo.com"

  sync-demo:
    name: Sync to demo
    runs-on: ubuntu-latest
    needs: deploy-main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync demo branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --heads origin demo | grep -q demo; then
            git checkout demo
            git merge main --no-edit -X theirs
            git push origin demo
          else
            git checkout -b demo
            git push origin demo
          fi
          echo "✅ demo synced"

  deploy-demo:
    name: Deploy Demo
    runs-on: ubuntu-latest
    needs: sync-demo
    steps:
      - uses: actions/checkout@v4
        with:
          ref: demo

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Create demo config
        run: |
          cat > wrangler.toml <<'EOF'
          name = "iodrive-demo"
          main = "src/index.ts"
          compatibility_date = "2024-12-01"
          account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          routes = [{ pattern = "demo.iodevo.com/*", zone_name = "iodevo.com" }]
          [vars]
          ADMIN_USER = "admin"
          R2_PUBLIC_DOMAIN = "r2.iodevo.com"
          R2_BUCKET = "iodrive-demo"
          R2_ACCOUNT_ID = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          TURNSTILE_SITE_KEY = "${{ secrets.TURNSTILE_SITE_KEY }}"
          S3_ENDPOINT = "${{ secrets.S3_ENDPOINT }}"
          S3_BUCKET = "${{ secrets.S3_BUCKET }}"
          S3_REGION = "${{ secrets.S3_REGION }}"
          PUBLIC_UPLOAD_PATH = "uploads/public/"
          [[r2_buckets]]
          binding = "DRIVE"
          bucket_name = "iodrive-demo"
          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF

      - name: Create secrets file
        run: |
          cat > .dev.vars <<'EOF'
          ADMIN_PASS=${{ secrets.ADMIN_PASS }}
          TURNSTILE_SECRET=${{ secrets.TURNSTILE_SECRET }}
          TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          EOF

      - name: Deploy to demo
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Success
        run: echo "✅ https://demo.iodevo.com"
